requirements:
  REQ-001:
    title: "Skill Self-Parsing"
    description: "Engine receives arbitrary SKILL.md file, parses it to extract structured semantic model (SkillSpec) with name, description, triggers, workflow steps, anti-patterns, output format, examples, content length, parse method, and parse confidence."
    acceptance_criteria:
      AC-001-01: "Analyzer correctly extracts YAML frontmatter from SKILL.md"
      AC-001-02: "Analyzer identifies workflow steps from ## Workflow/Process/Flow sections"
      AC-001-03: "Analyzer extracts anti-patterns from Anti-Patterns section tables"
      AC-001-04: "Analyzer extracts output format from Output Format sections"
      AC-001-05: "Analyzer calculates parse confidence based on extracted fields"
      AC-001-06: "Analyzer determines parse method (regex, llm, hybrid) based on confidence"
      AC-001-07: "Analyzer handles malformed SKILL.md with fallback strategies"
  
  REQ-002:
    title: "Auto-Test Generation"
    description: "Engine generates evaluation test cases (evals.json) based on SkillSpec, with initial generation followed by review and gap-filling cycles until coverage threshold is met."
    acceptance_criteria:
      AC-002-01: "Test generator creates at least 4 eval cases with diverse categories"
      AC-002-02: "Test generator includes 5 trigger cases (should_trigger and should_not_trigger)"
      AC-002-03: "Coverage calculation considers workflow steps, anti-patterns, and output formats"
      AC-002-04: "Review cycle identifies gaps in test coverage"
      AC-002-05: "Gap-filling adds supplementary tests to address uncovered areas"
      AC-002-06: "Convergence achieved when coverage >= 90% or max rounds reached"
      AC-002-07: "Fallback strategy uses minimum evals template when generation fails"
  
  REQ-003:
    title: "Self-Execution"
    description: "Engine executes eval cases in both with-skill and without-skill modes to measure skill effectiveness."
    acceptance_criteria:
      AC-003-01: "Runner executes eval cases with skill context injected"
      AC-003-02: "Runner executes eval cases without skill context"
      AC-003-03: "Execution respects rate limiting and concurrency controls"
      AC-003-04: "Timeout handling prevents infinite execution"
      AC-003-05: "Error propagation captures and reports execution failures"
      AC-003-06: "Token usage tracking monitors resource consumption"
  
  REQ-004:
    title: "Assertion-Based Grading"
    description: "Engine evaluates model outputs against eval assertions using deterministic checks (contains, not_contains, regex, starts_with, json_valid) with optional LLM-as-judge for complex behavior."
    acceptance_criteria:
      AC-004-01: "Grader supports contains assertion type with case-insensitive matching"
      AC-004-02: "Grader supports not_contains assertion type with case-insensitive matching"
      AC-004-03: "Grader supports regex assertion type with proper error handling"
      AC-004-04: "Grader supports starts_with assertion type"
      AC-004-05: "Grader supports json_valid assertion type with proper error handling"
      AC-004-06: "Grader applies weights to assertions (Normal=1, Important=2, Critical=3)"
      AC-004-07: "LLM-as-judge activated when deterministic checks are insufficient"
      AC-004-08: "LLM-as-judge operates with temperature=0 for consistency"
  
  REQ-005:
    title: "L1-L4 Metrics Calculation"
    description: "Engine calculates four-tier metrics: L1 (trigger accuracy), L2 (with/without skill delta), L3 (step adherence), L4 (execution stability)."
    acceptance_criteria:
      AC-005-01: "L1 calculates trigger accuracy from eval_category='trigger' cases"
      AC-005-02: "L2 compares performance between with-skill and without-skill runs"
      AC-005-03: "L3 measures workflow step coverage by passing evals"
      AC-005-04: "L4 calculates execution stability using standard deviation of deterministic assertions"
      AC-005-05: "L4 excludes LLM-as-judge results from stability calculation"
      AC-005-06: "Overall score is weighted average of L1-L4 metrics"
      AC-005-07: "Metrics include detailed breakdown for each tier"
  
  REQ-006:
    title: "Cross-Model Drift Detection"
    description: "Engine detects performance variations across different models by comparing pass rates and calculating drift severity."
    acceptance_criteria:
      AC-006-01: "Drift detector runs same evals across multiple models"
      AC-006-02: "Variance calculated as absolute difference in pass rates between models"
      AC-006-03: "Severity levels: none (≤0.10), low (≤0.20), moderate (≤0.35), high (>0.35)"
      AC-006-04: "Verdict unaffected by low/none drift, downgraded for moderate, failed for high"
      AC-006-05: "Aggregated report shows highest severity and average variance"
      AC-006-06: "Drift analysis compares all model pairs"
  
  REQ-007:
    title: "Standardized Reporting"
    description: "Engine generates Markdown and JSON reports with verdict (PASS/PASS_WITH_CAVEATS/FAIL), metrics breakdown, drift analysis, and improvement suggestions."
    acceptance_criteria:
      AC-007-01: "Markdown report includes executive summary with verdict and scores"
      AC-007-02: "Report details L1-L4 metrics with explanations"
      AC-007-03: "Report includes drift analysis with severity levels"
      AC-007-04: "Report shows evaluation coverage statistics"
      AC-007-05: "Report provides improvement suggestions based on metrics"
      AC-007-06: "JSON report contains structured data for machine processing"
      AC-007-07: "Reports include configuration and benchmark information"
  
  REQ-008:
    title: "Error Handling and Resilience"
    description: "Engine handles API failures, timeouts, and other errors gracefully with retry strategies and fallback mechanisms."
    acceptance_criteria:
      AC-008-01: "API calls implement exponential backoff retry strategy"
      AC-008-02: "Non-retryable errors (invalid_api_key, model_not_found) handled appropriately"
      AC-008-03: "Timeouts managed at individual eval and phase levels"
      AC-008-04: "Graceful degradation when models unavailable"
      AC-008-05: "Partial results preserved when errors occur"
      AC-008-06: "Configuration validation prevents invalid settings"
  
  REQ-009:
    title: "Concurrency Control and Security"
    description: "Engine manages concurrent API calls with rate limiting and implements security measures for safe execution."
    acceptance_criteria:
      AC-009-01: "Rate limiter enforces RPM limits per model"
      AC-009-02: "Concurrency control limits simultaneous requests"
      AC-009-03: "Input sanitization prevents injection attacks"
      AC-009-04: "Output length limits prevent excessive resource usage"
      AC-009-05: "Sensitive operations (file writes, shell commands) restricted"
      AC-009-06: "Token budget tracking prevents excessive costs"
  
  REQ-010:
    title: "CLI Entry Point"
    description: "Engine provides command-line interface with configurable parameters for models, output directory, and other options."
    acceptance_criteria:
      AC-010-01: "CLI accepts skill file path as primary parameter"
      AC-010-02: "CLI supports multiple model specification"
      AC-010-03: "CLI allows custom output directory"
      AC-010-04: "CLI validates input parameters before execution"
      AC-010-05: "CLI provides progress feedback during execution"
      AC-010-06: "CLI generates appropriate exit codes for different outcomes"

  REQ-011:
    title: "Cost Evaluation and Reporting"
    description: "Engine tracks token usage per eval, converts to $ cost using model pricing table, calculates L7 cost efficiency metrics, and includes cost analysis in reports."
    acceptance_criteria:
      AC-011-01: "Pricing table supports at least 15 models across 5 provider families (Anthropic, OpenAI, Qwen, DeepSeek, Gemini)"
      AC-011-02: "Each eval result includes cost field calculated from token usage × model pricing"
      AC-011-03: "L7 cost efficiency calculates cost_per_eval, total_cost, cost_with_skill, cost_without_skill"
      AC-011-04: "L7 calculates cost_delta_pct (with vs without skill cost comparison)"
      AC-011-05: "L7 calculates cost_efficiency (L2_delta / cost_delta_pct ratio)"
      AC-011-06: "EnvelopeChecker supports cost_budget parameter, flags violation when exceeded"
      AC-011-07: "Reports (Markdown + JSON) include cost analysis section when cost data available"
      AC-011-08: "Backward compatible: when no pricing data, cost returns 0 and reports skip cost section"