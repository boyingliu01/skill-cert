sprint: v0.4.0
created: 2026-06-18
issues: [47, 44, 43, 42]

requirements:
  REQ-001:
    title: "Fix analyzer.py confidence calculation"
    description: "_calculate_confidence() only recognizes fixed section names, under-weighting non-standard but valid section names."
    issue: "#47"
    acceptance_criteria:
      - AC-001-01: "Section aliases ## How I Work, ## Process, ## Steps map to workflow_steps (0.25)"
      - AC-001-02: "Section aliases ## What Not To Do, ## Gotchas map to anti_patterns (0.10)"
      - AC-001-03: "Section alias ## Response Format maps to output_format (0.08)"
      - AC-001-04: "Section aliases ## What I Do, ## When To Use map to triggers (0.07)"
      - AC-001-05: "ffmpeg-video skill parses at >= 0.6 confidence"

  REQ-002:
    title: "Implement negative cases evaluation"
    description: "Add negative_cases (should_not_trigger) support and F1 scoring."
    issue: "#44"
    acceptance_criteria:
      - AC-002-01: "EvalCase has negative_case: bool field"
      - AC-002-02: "EvalCase has confusion_prompt: str | None field"
      - AC-002-03: "F1 scoring: precision = TP/(TP+FP), recall = TP/(TP+FN), F1 = 2*precision*recall/(precision+recall)"
      - AC-002-04: "negative_cases evaluated as should_not_trigger"

  REQ-003:
    title: "Implement L1 TriggerAccuracyEval"
    description: "New TriggerAccuracyEval class for dedicated L1 trigger accuracy testing."
    issue: "#43"
    acceptance_criteria:
      - AC-003-01: "TriggerAccuracyEval class exists in engine/trigger_accuracy_eval.py"
      - AC-003-02: "evaluate() separates positive and negative cases"
      - AC-003-03: "L1 >= 90% threshold gate blocks evaluation if below"
      - AC-003-04: "should_trigger and should_not_trigger test cases"

  REQ-004:
    title: "Implement GotchasFlywheel"
    description: "Auto-extract gotchas from failed evals and persist to references/gotchas.md."
    issue: "#42"
    acceptance_criteria:
      - AC-004-01: "GotchasFlywheel class exists in engine/gotchas_flywheel.py"
      - AC-004-02: "extract_from_failure() returns gotcha text from EvalResult"
      - AC-004-03: "append() saves to skill/references/gotchas.md"
      - AC-004-04: "load() reads accumulated gotchas"
      - AC-004-05: "Runner calls GotchasFlywheel after each eval run"