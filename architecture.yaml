# Architecture Configuration for skill-cert
# Clean Architecture layer boundaries adapted for Python evaluation engine
#
# Format: archy (https://github.com/hslee16/Archy)
# domain = engine/ — core pipeline (parser, testgen, runner, grader, metrics, ...)
# infrastructure = adapters/ — LLM provider adapters
# presentation = skill_cert/ — CLI entry point
# support = prompts/ + schemas/ + templates/ — reference data, no business logic
#
# Rules:
#   ARCH-001: Domain must not import from Presentation (skill_cert/)
#   ARCH-002: Adapters must not import from Domain (engine/) or Presentation
#   ARCH-003: Presentation may import Domain (Python convention — relaxed)
#   ARCH-004: Support (static data) must not import any code layer

layers:
  domain:
    modules:
      - engine
  infrastructure:
    modules:
      - adapters
  presentation:
    modules:
      - skill_cert
  support:
    modules:
      - prompts
      - schemas
      - templates

forbid:
  # ARCH-001: Engine must not import from presentation
  - from: domain
    to: presentation
  # ARCH-002: Adapters must not import from engine or skill_cert
  - from: infrastructure
    to: domain
  - from: infrastructure
    to: presentation
  # ARCH-004: Support must not import from code layers
  - from: support
    to: domain
  - from: support
    to: infrastructure
  - from: support
    to: presentation

exclude:
  - tests/**
  - build/**
  - scripts/**
  - results/**
  - node_modules/**
  - "**/__pycache__/**"
  - "**/*.pyc"
